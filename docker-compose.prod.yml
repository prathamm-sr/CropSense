# docker-compose.prod.yml
# Production compose — pulls pre-built images from Docker Hub
# instead of building locally. Used on a server after CD has pushed images.
#
# Usage on server:
#   export DOCKER_USERNAME=yourusername
#   docker compose -f docker-compose.prod.yml up -d

services:

  ml-service:
    image: ${DOCKER_USERNAME}/cropsense-ml-service:latest
    container_name: cropsense-ml-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  backend:
    image: ${DOCKER_USERNAME}/cropsense-backend:latest
    container_name: cropsense-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      ML_SERVICE_URL: http://ml-service:8000
      BACKEND_PORT: 8001
      CORS_ORIGINS: "*"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    depends_on:
      ml-service:
        condition: service_healthy

  frontend:
    image: ${DOCKER_USERNAME}/cropsense-frontend:latest
    container_name: cropsense-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: cropsense-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      - ml-service
      - backend

  grafana:
    image: grafana/grafana:11.1.0
    container_name: cropsense-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: cropsense
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data: