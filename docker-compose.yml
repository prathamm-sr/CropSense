# docker-compose.yml
# ------------------
# Wires all Phase 3 services together.
# Run everything: docker compose up --build
#
# Services:
#   postgres      — PostgreSQL 16
#   ml-service    — Phase 2 FastAPI ML microservice (port 8000)
#   backend       — Phase 3 main backend (port 8001)

version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cropsense-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cropsense
      POSTGRES_PASSWORD: cropsense
      POSTGRES_DB: cropsense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cropsense -d cropsense"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ML Microservice (Phase 2) ───────────────────────────────────────────────
  ml-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cropsense-ml-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Mount trained artifacts so container uses latest model without rebuild
      - ./models:/app/models
      - ./outputs:/app/outputs
    environment:
      PORT: 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy

  # ── Main Backend (Phase 3) ──────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cropsense-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://cropsense:cropsense@postgres:5432/cropsense
      ML_SERVICE_URL: http://ml-service:8000
      BACKEND_PORT: 8001
      CORS_ORIGINS: "*"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_healthy

volumes:
  postgres_data: