# docker-compose.yml
# Run everything: docker compose up --build
#
# Services:
#   ml-service  → port 8000  (ML microservice)
#   backend     → port 8001  (main API + PostgreSQL)
#   frontend    → port 80    (React via nginx)
#
# PostgreSQL: uses Neon (cloud) — no local postgres container needed.
# Set your real values in a .env file at repo root.

version: "3.9"

services:

  # ── ML Microservice (Phase 2) ───────────────────────────────────────────────
  ml-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cropsense-ml-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./outputs:/app/outputs
    environment:
      PORT: 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Main Backend (Phase 3) ──────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cropsense-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env                          # reads DATABASE_URL, etc. from your .env
    environment:
      ML_SERVICE_URL: http://ml-service:8000   # internal Docker network name
      BACKEND_PORT: 8001
      CORS_ORIGINS: "*"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    depends_on:
      ml-service:
        condition: service_healthy

  # ── Frontend (Phase 4) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cropsense-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy