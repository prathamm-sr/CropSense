# .github/workflows/ci.yml
# Runs on every push and pull request.
# Jobs: lint → test
# Blocks merges if either fails.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.5.0

      - name: Run ruff
        run: ruff check ml/ app/ backend/

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install ML dependencies
        run: pip install -r requirements.txt pytest

      - name: Generate synthetic dataset
        run: |
          python - << 'PYEOF'
          import numpy as np, pandas as pd, os
          np.random.seed(42)
          crops = ['rice','maize','chickpea','kidneybeans','pigeonpeas','mothbeans',
                   'mungbean','blackgram','lentil','pomegranate','banana','mango',
                   'grapes','watermelon','muskmelon','apple','orange','papaya',
                   'coconut','cotton','jute','coffee']
          profiles = {
            'rice':[80,55,45,23,82,6.3,230],'maize':[78,48,20,22,65,6.2,80],
            'chickpea':[40,68,80,18,17,7.3,80],'kidneybeans':[20,68,20,20,21,5.7,105],
            'pigeonpeas':[20,68,20,28,49,5.8,150],'mothbeans':[20,48,20,28,53,6.9,50],
            'mungbean':[20,48,20,28,86,6.7,50],'blackgram':[40,68,20,30,66,7.1,70],
            'lentil':[18,68,20,25,65,6.9,45],'pomegranate':[18,18,40,21,90,6.5,110],
            'banana':[100,82,50,27,80,6.0,105],'mango':[20,28,30,31,51,5.8,95],
            'grapes':[23,133,200,24,82,6.1,70],'watermelon':[100,18,50,25,85,6.5,50],
            'muskmelon':[100,18,50,28,92,6.4,25],'apple':[21,134,199,22,92,5.9,115],
            'orange':[20,16,10,22,92,7.0,110],'papaya':[49,60,50,34,92,6.7,145],
            'coconut':[22,16,30,27,94,5.9,155],'cotton':[120,46,20,24,80,6.5,70],
            'jute':[78,46,40,25,80,6.8,175],'coffee':[101,28,30,25,58,6.8,155],
          }
          rows = []
          for crop,(Nmu,Pmu,Kmu,tmu,hmu,phmu,rmu) in profiles.items():
            n=100
            rows.append(pd.DataFrame({
              'N':np.clip(np.random.normal(Nmu,Nmu*0.12+2,n),0,140).round(1),
              'P':np.clip(np.random.normal(Pmu,Pmu*0.12+2,n),5,145).round(1),
              'K':np.clip(np.random.normal(Kmu,Kmu*0.12+2,n),5,205).round(1),
              'temperature':np.clip(np.random.normal(tmu,2.5,n),8,43).round(2),
              'humidity':np.clip(np.random.normal(hmu,5,n),14,100).round(2),
              'ph':np.clip(np.random.normal(phmu,0.4,n),3.5,9.5).round(2),
              'rainfall':np.clip(np.random.normal(rmu,rmu*0.15+5,n),20,300).round(2),
              'label':crop,
            }))
          os.makedirs('data', exist_ok=True)
          pd.concat(rows).sample(frac=1,random_state=42).reset_index(drop=True).to_csv('data/crop_recommendation.csv',index=False)
          print("Dataset generated.")
          PYEOF

      - name: Train model
        run: python -m ml.train

      - name: Evaluate model
        run: python -m ml.evaluate

      - name: Run pytest
        run: pytest tests/ -v --tb=short