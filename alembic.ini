[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = postgresql://neondb_owner:npg_q8Bk9ebGpCaY@ep-billowing-lake-akatvh2b-pooler.c-3.us-west-2.aws.neon.tech/neondb?sslmode=require&channel_binding=require

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S